<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Harbour</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Shift Harbour</h1>
    </header>
    <main>
        <section id="applications">
            <h2>Your Applications</h2>
            <ul>
                <!-- Application list generated dynamically -->
                <li>
                    <h3>Candidate Name</h3>
                    <button class="accept-btn">Accept</button>
                    <button class="reject-btn">Reject</button>
                    <button class="interview-btn">Schedule Interview</button>
                </li>
                <!-- Repeat for more candidates -->
            </ul>
        </section>
        <div id="interview-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Schedule Interview</h2>
                <label for="interview-date">Date:</label>
                <input type="date" id="interview-date">
                <label for="interview-time">Time:</label>
                <input type="time" id="interview-time">
                <button id="confirm-interview">Confirm</button>
            </div>
        </div>
        <div id="rejection-reason-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Rejection Reason</h2>
                <textarea id="rejection-reason" rows="4" placeholder="Enter reason..."></textarea>
                <button id="submit-reason">Submit</button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Shift Harbour. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
